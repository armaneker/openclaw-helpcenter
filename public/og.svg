<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#1f1f1f" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#1f1f1f" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#1f1f1f" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#1f1f1f" stroke-width="1"/>

  <!-- Accent bar -->
  <rect x="80" y="240" width="6" height="120" fill="url(#accent)" rx="3"/>

  <!-- Title -->
  <text x="116" y="296" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="64" font-weight="700" fill="#f9fafb" letter-spacing="-1">Agentic Playbook</text>

  <!-- Tagline -->
  <text x="116" y="352" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="400" fill="#9ca3af">Tested guides for AI agent systems in production</text>

  <!-- Tag pills -->
  <rect x="116" y="390" width="120" height="34" rx="17" fill="#1e1b4b"/>
  <text x="176" y="412" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#818cf8" text-anchor="middle">OpenClaw</text>

  <rect x="252" y="390" width="88" height="34" rx="17" fill="#1e1b4b"/>
  <text x="296" y="412" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#818cf8" text-anchor="middle">Skills</text>

  <rect x="356" y="390" width="130" height="34" rx="17" fill="#1e1b4b"/>
  <text x="421" y="412" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#818cf8" text-anchor="middle">LangSmith</text>

  <!-- Domain -->
  <text x="116" y="520" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" fill="#4b5563">agentic-playbook.dev</text>
</svg>

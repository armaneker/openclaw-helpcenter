name: Update Star Trends

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-trends
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch trends and compute deltas
        run: node scripts/fetch-trends.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/trends/
          if git diff --cached --quiet; then
            echo "No trend changes"
            exit 0
          fi
          git commit -m "chore: update star trend data"
          for attempt in 1 2 3 4 5; do
            if git push; then exit 0; fi
            echo "Push failed, rebasing..."
            git pull --rebase origin main
          done
          exit 1

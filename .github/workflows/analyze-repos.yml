name: Analyze New Repos

on:
  workflow_run:
    workflows: ["Update Star Trends"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: analyze-repos
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate summaries for new repos
        run: node scripts/analyze-new-repos.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit new summary pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/app/trends/projects/ src/data/trends/repos.json src/data/trends/computed/trends.json
          git diff --cached --quiet || git commit -m "feat: add summaries for new trending repos"
          git push

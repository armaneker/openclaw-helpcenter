name: Generate Transcripts & Audio

on:
  # Regenerate when guide content changes
  push:
    branches: [main]
    paths:
      - 'src/app/getting-started/**/page.mdx'
      - 'src/app/openclaw/**/page.mdx'
      - 'src/app/skills/**/page.mdx'
      - 'src/app/about/**/page.mdx'
  # Manual trigger
  workflow_dispatch:
    inputs:
      force:
        description: 'Force regenerate all transcripts and audio'
        required: false
        default: 'false'
        type: boolean
      page:
        description: 'Single page to regenerate (e.g. openclaw/architecture)'
        required: false
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate transcripts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          INPUT_FORCE: ${{ inputs.force }}
          INPUT_PAGE: ${{ inputs.page }}
        run: |
          ARGS=""
          if [ "$INPUT_FORCE" = "true" ]; then
            ARGS="--force"
          fi
          if [ -n "$INPUT_PAGE" ]; then
            ARGS="$ARGS --page $INPUT_PAGE"
          fi
          node scripts/generate-transcripts.mjs $ARGS

      - name: Generate audio files
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          INPUT_FORCE: ${{ inputs.force }}
          INPUT_PAGE: ${{ inputs.page }}
        run: |
          ARGS=""
          if [ "$INPUT_FORCE" = "true" ]; then
            ARGS="--force"
          fi
          if [ -n "$INPUT_PAGE" ]; then
            ARGS="$ARGS --page $INPUT_PAGE"
          fi
          node scripts/generate-audio.mjs $ARGS

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/transcripts/ public/audio/ src/data/transcript-manifest.json src/data/audio-manifest.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: regenerate transcripts and audio for guide pages"
          # Retry push with rebase to handle races with concurrent trend-update workflow
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push failed on attempt $attempt, rebasing against origin/main..."
            git pull --rebase origin main
          done
          echo "Failed to push after 5 attempts" >&2
          exit 1
